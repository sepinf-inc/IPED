name: iped-face
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy
  - opencv
  - pillow
  - openjdk=11
  - maven
  - pip
  - pip:
    - mediapipe       # face detection (Apache 2.0) — used by default 'auraface' model
    - onnxruntime     # CPU-only; lightweight and sufficient for multi-process parallelism
    # Optional: install insightface for buffalo_l/buffalo_s models (non-commercial license)
    # - "numpy>=1.26,<2"  # needed only if using insightface (C extensions require NumPy 1.x ABI)
    # - insightface
